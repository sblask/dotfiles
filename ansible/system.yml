- name: Play to install Linux packages
  hosts: all

  tasks:

    - name: Sudo non path
      command: echo $PATH
      changed_when: false
      become: true
      environment:
        PATH: "{{ target_directory }}/.bin:{{ target_directory }}/.asdf/shims:{{ ansible_env.PATH }}"
      register: output3

    - name: Display sudo non path
      debug:
        msg: "{{ output3.stdout }}"


    - name: Sudo path
      command: echo $PATH
      environment:
        PATH: "{{ target_directory }}/.bin:{{ target_directory }}/.asdf/shims:{{ ansible_env.PATH }}"
      register: output1
      changed_when: False
      become: true

    - name: Display sudo path
      debug:
        msg: "{{ output1.stdout }}"


    - name: Sudo which python
      command: which python
      changed_when: false
      become: true
      # environment:
      #   PATH: "{{ target_directory }}/.bin:{{ target_directory }}/.asdf/shims:{{ ansible_env.PATH }}"
      register: output2

    - name: Display sudo which python
      debug:
        msg: "{{ output2.stdout }}"

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
      changed_when: false
      become: true
      environment:
        PATH: "{{ target_directory }}/.bin:{{ target_directory }}/.asdf/shims:{{ ansible_env.PATH }}"

    - name: Ensure useful packages are installed
      ansible.builtin.apt:
        state: present
        name: "{{ item }}"
      loop:
        - amazon-ecr-credential-helper
        # - asunder  # cd ripper
        # - audacity  # audio editor
        # - autofs
        # - autokey-gtk
        # - baobab  # to analyze disk usage from Thunar context menu
        # - bat
        # - boxes
        # - colordiff
        # - entr  # do stuff when files change
        # - fd-find
        # - feh
        # - geary
        # - gimp
        # - git
        # - gnome-font-viewer
        # - gparted
        # - htop
        # - inkscape
        # - jo
        # - jq
        # - kazam
        # - lame
        # - libreoffice
        # - lolcat
        # - meld
        # - moreutils  # contains sponge command
        # - neovim
        # - ntp
        # - oathtool
        # - parcellite  # keeps copied text in the clipboard even after applications have been closed
        # - pdfchain
        # - pinta
        # - pulseaudio-module-bluetooth  # enable bluetooth (fixes Connection Failed: blueman.bluez.errors.DBusFailedError: Protocol not available...)
        # - pv
        # - python-is-python3
        # - python3-dev
        # - python3-venv
        # - ranger
        # - rename
        # - ripgrep
        # - screenkey
        # - shellcheck
        # - taskwarrior
        # - texlive
        # - texlive-lang-german
        # - tmux  # use 'CTRL-B' + 'I' to install the plugins
        # - trash-cli
        # - tree
        # - usb-creator-gtk
        # - vlc
        # - xbacklight
        # - xclip
        # - xfce4-terminal
        # - zsh
      become: true
      environment:
        PATH: "{{ target_directory }}/.asdf:{{ ansible_env.PATH }}"

    - name: Ensure useless/unwanted packages are removed
      ansible.builtin.apt:
        state: absent
        name: "{{ item }}"
      loop:
        - gnome-mines
        - gnome-sudoku
        - indicator-messages
        - mousepad
        - parole
        - pidgin
        - ristretto
        - snapd
      become: true
      environment:
        PATH: "{{ target_directory }}/.asdf:{{ ansible_env.PATH }}"

    - name: Make ZSH default shell
      user:
        name: sebastian
        shell: /bin/zsh
      become: true
      environment:
        PATH: "{{ target_directory }}/.asdf:{{ ansible_env.PATH }}"
